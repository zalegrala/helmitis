name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test + gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jsonnet + kubeconform
        run: |
          go install github.com/google/go-jsonnet/cmd/jsonnet@latest
          go install github.com/yannh/kubeconform/cmd/kubeconform@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: azure/setup-helm@v4

      - name: Format + vet
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
          go vet ./...

      # Runs unit tests AND the installability acceptance gates (helm lint +
      # helm template + kubeconform, incl. CRD catalog) since the tools are present.
      - name: Test
        run: go test ./... -v

  install:
    name: real install (kind)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jsonnet
        run: |
          go install github.com/google/go-jsonnet/cmd/jsonnet@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: azure/setup-helm@v4

      # Spins up a real Kubernetes cluster; sets the kubeconfig context.
      - name: Create kind cluster
        uses: helm/kind-action@v1

      # The ultimate installability proof: stamp a chart, then have the real API
      # server validate it via a server-side dry-run (schemas + admission). Uses
      # the minimal example (no CRDs, which a bare cluster wouldn't have).
      - name: Stamp + server-side install
        run: |
          go run ./cmd/stamp --jsonnet examples/minimal/main.jsonnet --out ./_chart --no-validate-output
          helm install hello ./_chart --dry-run=server
